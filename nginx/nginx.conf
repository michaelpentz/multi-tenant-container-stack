user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load dynamic modules
load_module modules/ngx_http_geoip2_module.so;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with detailed timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'country="$geoip2_data_country_name"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning for high-latency connections
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Timeouts for global users
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 86400s;  # For WebSocket
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=foundry:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=foundry_burst:10m rate=50r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # GeoIP for analytics (optional)
    geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
        $geoip2_data_country_name country names en;
        $geoip2_data_country_code country iso_code;
    }

    # Upstream definitions with keepalive
    upstream foundry_campaign1 {
        server foundry-campaign1:30000;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    upstream foundry_campaign2 {
        server foundry-campaign2:30000;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    # Health check endpoint
    server {
        listen 80;
        server_name localhost;
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Campaign 1 server
    server {
        listen 80;
        server_name campaign1.yourdomain.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            # Rate limiting
            limit_req zone=foundry burst=20 nodelay;
            limit_req zone=foundry_burst burst=50 nodelay;
            limit_conn addr 10;

            proxy_pass http://foundry_campaign1;
            proxy_http_version 1.1;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Critical: Disable buffering for WebSocket
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Timeouts for long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Buffer settings
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 @maintenance;
        }

        # Cache static assets aggressively
        location ~* ^/(assets|images|sounds|icons)/ {
            proxy_pass http://foundry_campaign1;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            
            # Serve from cache if backend is slow
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        }

        # Cache other static files
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
            proxy_pass http://foundry_campaign1;
            expires 1d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Maintenance page
        location @maintenance {
            return 503 "Service temporarily unavailable. Please try again in a moment.";
        }
    }

    # Campaign 2 server
    server {
        listen 80;
        server_name campaign2.yourdomain.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            limit_req zone=foundry burst=20 nodelay;
            limit_req zone=foundry_burst burst=50 nodelay;
            limit_conn addr 10;

            proxy_pass http://foundry_campaign2;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_buffering off;
            proxy_request_buffering off;
            
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            proxy_intercept_errors on;
            error_page 502 503 504 @maintenance;
        }

        location ~* ^/(assets|images|sounds|icons)/ {
            proxy_pass http://foundry_campaign2;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
            proxy_pass http://foundry_campaign2;
            expires 1d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location @maintenance {
            return 503 "Service temporarily unavailable. Please try again in a moment.";
        }
    }
}
