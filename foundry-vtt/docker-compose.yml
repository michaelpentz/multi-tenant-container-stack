version: '3.8'

# Foundry VTT - Multi-Campaign Docker Setup
# Shared Data Volume Architecture for Game Asset Deduplication
# SECURITY HARDENED VERSION - All critical issues fixed

services:
  campaign1:
    image: felddy/foundryvtt:13.351
    container_name: foundry-campaign1
    restart: unless-stopped
    ports:
      - "30000:30000"
    environment:
      - FOUNDRY_COMPRESS_WEBSOCKET=true
      - FOUNDRY_VERSION=${FOUNDRY_VERSION}
      - FOUNDRY_LICENSE_KEY=${FOUNDRY_LICENSE_KEY_1}
      - FOUNDRY_ADMIN_KEY=${FOUNDRY_ADMIN_KEY}
      - FOUNDRY_PORT=30000
      - FOUNDRY_UPNP=false
      - FOUNDRY_USERNAME=${FOUNDRY_USERNAME}
      - FOUNDRY_PASSWORD=${FOUNDRY_PASSWORD}
      - TZ=${TZ:-UTC}
    volumes:
      # Isolated campaign data
      - ./data/campaign1:/data
      # Shared read-only assets across all campaigns
      - ./shared_assets:/data/shared_assets:ro
    networks:
      - foundry-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name"
    labels:
      - "app=foundry-vtt"
      - "component=campaign1"
      - "environment=production"

  campaign2:
    image: felddy/foundryvtt:13.351
    container_name: foundry-campaign2
    restart: unless-stopped
    ports:
      - "30001:30000"
    environment:
      - FOUNDRY_COMPRESS_WEBSOCKET=true
      - FOUNDRY_VERSION=${FOUNDRY_VERSION}
      - FOUNDRY_LICENSE_KEY=${FOUNDRY_LICENSE_KEY_2}
      - FOUNDRY_ADMIN_KEY=${FOUNDRY_ADMIN_KEY}
      - FOUNDRY_PORT=30000
      - FOUNDRY_UPNP=false
      - FOUNDRY_USERNAME=${FOUNDRY_USERNAME}
      - FOUNDRY_PASSWORD=${FOUNDRY_PASSWORD}
      - TZ=${TZ:-UTC}
    volumes:
      # Isolated campaign data
      - ./data/campaign2:/data
      # Shared read-only assets across all campaigns
      - ./shared_assets:/data/shared_assets:ro
    networks:
      - foundry-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name"
    labels:
      - "app=foundry-vtt"
      - "component=campaign2"
      - "environment=production"

networks:
  foundry-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1500"
